<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AEROAFFAIRES — Réseau Opérateurs</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<link rel="stylesheet" href="style.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
</head>
<body>

<!-- LOADER -->
<div id="loader">
  <img src="hup.webp" alt="HUP" style="
    height:220px;width:auto;
    filter:drop-shadow(0 0 8px white) drop-shadow(0 0 22px white) drop-shadow(0 0 45px rgba(255,255,255,0.5));
    animation:floatIn 0.8s ease-out forwards;
    margin-bottom:10px;
  ">
  <div style="
    font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:5px;
    color:white;
    text-shadow:0 0 8px white,0 0 20px white,0 0 40px rgba(255,255,255,0.5);
    margin-bottom:22px;
    animation:floatIn 1s ease-out forwards;
  ">CLAUDE × HUP</div>
  <div class="loader-logo">
    <img src="LOGOS-AA_HORIZON.svg" alt="AEROAFFAIRES" style="height:48px;width:auto;opacity:0.85;">
  </div>
  <div class="loader-bar-bg" style="margin-top:16px"><div class="loader-bar" style="animation-duration:3s"></div></div>
  <div class="loader-text" id="loader-text">Chargement des opérateurs…</div>
</div>
<style>
@keyframes floatIn {
  from { opacity:0; transform:translateY(16px); }
  to   { opacity:1; transform:translateY(0); }
}
</style>

<!-- HEADER -->
<header>
  <div class="logo">
    <img src="LOGOS-AA_HORIZON.svg" alt="AEROAFFAIRES" style="height:32px;width:auto;">
    <span class="logo-sub">Réseau opérateurs hélicoptère</span>
  </div>
  <div class="header-right">
    <div class="pill live"><div class="live-dot"></div> LIVE</div>
    <div class="pill" id="counter">— opérateurs</div>
    <div class="pill" id="base-counter">— bases</div>
  </div>
</header>

<!-- TOOLBAR -->
<div class="toolbar">
  <div class="search-wrap" style="position:relative">
    <span class="search-icon">🔍</span>
    <input class="search" type="text" id="search" placeholder="Opérateur, ville, pays…" style="width:300px" autocomplete="off">
    <div id="location-suggestions" style="
      display:none;position:absolute;top:calc(100% + 6px);left:0;right:0;
      background:#0f1829;border:1px solid rgba(255,255,255,0.1);
      border-radius:8px;z-index:9999;overflow:hidden;
      box-shadow:0 8px 24px rgba(0,0,0,0.5);min-width:320px;
    "></div>
  </div>
  <div class="filter-btns" id="filter-btns">
    <button class="filt active" data-f="all">Tous</button>
  </div>
  <div class="toolbar-right">
    <button class="btn-refresh" id="btn-refresh" onclick="loadData()">↻ Actualiser</button>
    <button class="btn-refresh" id="btn-debug" onclick="debugData()" style="border-color:rgba(248,113,113,0.3);color:#f87171;background:rgba(248,113,113,0.1)">🔍 Debug</button>
  </div>
</div>

<!-- MAIN -->
<div class="main">
  <div id="sidebar">
    <div class="sidebar-count" id="sidebar-count">Chargement…</div>
    <div class="op-list" id="op-list"></div>
  </div>
  <div id="map"></div>
  <div id="detail">
    <div class="detail-inner">
      <div class="detail-head">
        <button class="detail-close" onclick="closeDetail()">✕</button>
        <div class="detail-name" id="d-name">—</div>
        <div class="detail-loc" id="d-loc">—</div>
      </div>
      <div class="detail-body" id="d-body"></div>
    </div>
  </div>
</div>

<div id="toast"></div>
<div class="radius-badge" id="radius-badge">
  <span id="radius-label">📍 —</span>
  <span class="radius-close" onclick="clearLocation()">✕</span>
</div>

<script src="app.js"></script>
</body>
</html>
