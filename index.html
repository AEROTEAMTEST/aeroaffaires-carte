<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AEROAFFAIRES — Réseau Opérateurs</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --navy:       #0b0f1a;
    --navy2:      #111827;
    --navy3:      #1a2035;
    --gold:       #b8963e;
    --gold2:      #d4aa5a;
    --sky:        #1e3a6e;
    --green:      #34d399;
    --red:        #c0392b;
    --white:      #f5f0e8;
    --muted:      #7a7060;
    --text:       #c8bfa8;
    --border:     rgba(184,150,62,0.18);
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--navy);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── HEADER ── */
  header {
    background: var(--navy2);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    height: 54px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    z-index: 1000;
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 3px;
    color: var(--gold);
    display: flex; align-items: center; gap: 10px;
  }

  .logo-sub {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
    border-left: 1px solid var(--border);
    padding-left: 12px;
  }

  .header-right {
    display: flex; align-items: center; gap: 10px;
  }

  .pill {
    background: rgba(232,184,75,0.1);
    border: 1px solid rgba(232,184,75,0.25);
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 11px;
    color: var(--gold);
    font-family: 'DM Mono', monospace;
    letter-spacing: 1px;
  }

  .pill.live {
    background: rgba(52,211,153,0.1);
    border-color: rgba(52,211,153,0.25);
    color: var(--green);
    display: flex; align-items: center; gap: 5px;
  }

  .live-dot {
    width: 6px; height: 6px;
    background: var(--green);
    border-radius: 50%;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  /* ── TOOLBAR ── */
  .toolbar {
    background: var(--navy2);
    border-bottom: 1px solid var(--border);
    padding: 10px 24px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }

  .search-wrap { position: relative; }
  .search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); font-size: 13px; color: var(--muted); pointer-events: none; }

  .search {
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px 8px 32px;
    color: var(--text);
    font-size: 13px;
    font-family: 'DM Sans', sans-serif;
    outline: none;
    width: 260px;
    transition: border-color 0.2s;
  }
  .search:focus { border-color: rgba(232,184,75,0.4); }

  .filter-btns { display: flex; gap: 6px; }

  .filt {
    padding: 6px 14px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.5px;
  }
  .filt:hover { border-color: var(--gold); color: var(--gold); }
  .filt.active { background: rgba(232,184,75,0.1); border-color: rgba(232,184,75,0.35); color: var(--gold); }

  .toolbar-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }

  .btn-refresh {
    background: rgba(78,163,212,0.1);
    border: 1px solid rgba(78,163,212,0.25);
    color: var(--sky);
    padding: 7px 14px;
    border-radius: 6px;
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    cursor: pointer;
    transition: all 0.2s;
    display: flex; align-items: center; gap: 6px;
  }
  .btn-refresh:hover { background: rgba(78,163,212,0.18); }
  .btn-refresh.loading { opacity: 0.6; pointer-events: none; }

  /* ── MAIN ── */
  .main {
    flex: 1;
    display: flex;
    overflow: hidden;
  }

  /* ── SIDEBAR ── */
  #sidebar {
    width: 300px;
    background: var(--navy2);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    flex-shrink: 0;
  }

  .sidebar-count {
    padding: 10px 16px;
    font-size: 10px;
    font-family: 'DM Mono', monospace;
    color: var(--muted);
    border-bottom: 1px solid var(--border);
    letter-spacing: 1px;
  }

  .op-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
  }

  .op-list::-webkit-scrollbar { width: 3px; }
  .op-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 2px; }

  .op-item {
    padding: 11px 13px;
    border-radius: 8px;
    border: 1px solid transparent;
    margin-bottom: 4px;
    cursor: pointer;
    transition: all 0.15s;
    background: rgba(255,255,255,0.02);
  }

  .op-item:hover { background: rgba(78,163,212,0.06); border-color: rgba(78,163,212,0.15); }
  .op-item.active { background: rgba(232,184,75,0.07); border-color: rgba(232,184,75,0.3); }

  .op-name { font-weight: 600; font-size: 12px; margin-bottom: 3px; }
  .op-base { font-size: 11px; color: var(--muted); display: flex; align-items: center; gap: 4px; }

  .op-tags { display: flex; gap: 4px; margin-top: 5px; flex-wrap: wrap; }
  .tag {
    font-size: 10px;
    font-family: 'DM Mono', monospace;
    padding: 2px 6px;
    border-radius: 3px;
    background: rgba(78,163,212,0.08);
    border: 1px solid rgba(78,163,212,0.15);
    color: var(--sky);
  }

  /* ── MAP ── */
  #map { flex: 1; }

  /* ── DETAIL PANEL ── */
  #detail {
    width: 0;
    overflow: hidden;
    transition: width 0.3s cubic-bezier(0.4,0,0.2,1);
    background: var(--card);
    border-left: 1px solid var(--border);
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
  }

  #detail.open { width: 320px; }

  .detail-inner {
    width: 320px;
    display: flex;
    flex-direction: column;
    height: 100%;
    overflow: hidden;
  }

  .detail-head {
    padding: 20px;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(135deg, rgba(232,184,75,0.05), transparent);
    position: relative;
  }

  .detail-close {
    position: absolute; top: 14px; right: 14px;
    background: rgba(255,255,255,0.06);
    border: none; color: var(--muted);
    width: 26px; height: 26px;
    border-radius: 50%;
    cursor: pointer; font-size: 14px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
  }
  .detail-close:hover { background: rgba(248,113,113,0.2); color: var(--red); }

  .detail-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 24px;
    letter-spacing: 2px;
    color: var(--gold);
    line-height: 1.1;
    margin-bottom: 4px;
    padding-right: 32px;
  }

  .detail-loc { font-size: 11px; color: var(--muted); }

  .detail-body { flex: 1; overflow-y: auto; padding: 18px; }
  .detail-body::-webkit-scrollbar { width: 3px; }
  .detail-body::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); }

  .d-section { margin-bottom: 18px; }
  .d-title {
    font-size: 10px; text-transform: uppercase; letter-spacing: 2px;
    color: var(--muted); font-family: 'DM Mono', monospace;
    margin-bottom: 8px; padding-bottom: 5px;
    border-bottom: 1px solid var(--border);
  }

  .d-fleet-item {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 10px; border-radius: 6px;
    background: rgba(78,163,212,0.05);
    border: 1px solid rgba(78,163,212,0.1);
    margin-bottom: 4px; font-size: 12px;
  }

  .d-contact {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 10px; border-radius: 6px;
    background: rgba(52,211,153,0.05);
    border: 1px solid rgba(52,211,153,0.1);
    margin-bottom: 4px; font-size: 12px;
  }

  .d-contact a { color: var(--green); text-decoration: none; word-break: break-all; }
  .d-contact a:hover { color: var(--text); }

  /* ── LOADER ── */
  #loader {
    position: fixed; inset: 0;
    background: var(--navy);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 9999;
    gap: 16px;
    transition: opacity 0.5s;
  }

  #loader.hidden { opacity: 0; pointer-events: none; }

  .loader-logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 36px; letter-spacing: 4px; color: var(--gold);
  }

  .loader-bar-bg {
    width: 200px; height: 3px;
    background: rgba(255,255,255,0.07);
    border-radius: 2px; overflow: hidden;
  }

  .loader-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--gold2), var(--gold));
    border-radius: 2px;
    animation: load 1.5s ease-in-out forwards;
  }

  @keyframes load {
    from { width: 0%; }
    to   { width: 100%; }
  }

  .loader-text {
    font-family: 'DM Mono', monospace;
    font-size: 11px; color: var(--muted);
    letter-spacing: 2px;
  }

  /* ── LEAFLET ── */
  .leaflet-tile-pane { filter: none; } /* Native dark map — no filter needed */

  /* ── TOOLTIP SURVOL ── */
  .aa-tooltip {
    background: rgba(11,15,26,0.97) !important;
    border: 1px solid rgba(184,150,62,0.35) !important;
    border-radius: 10px !important;
    box-shadow: 0 8px 32px rgba(0,0,0,0.6), 0 0 0 1px rgba(184,150,62,0.08) !important;
    padding: 0 !important;
    color: var(--text) !important;
    font-family: 'Montserrat', sans-serif !important;
    white-space: nowrap;
    pointer-events: none;
  }
  .aa-tooltip::before { display:none !important; }
  .leaflet-tooltip.aa-tooltip { margin-left: 14px; }
  .tt-inner { padding: 10px 14px; min-width: 160px; }
  .tt-name {
    font-size: 12px; font-weight: 700;
    color: #f5f0e8; letter-spacing: 0.04em;
    margin-bottom: 3px;
  }
  .tt-base {
    font-size: 10px; color: var(--muted);
    letter-spacing: 0.05em; margin-bottom: 6px;
  }
  .tt-flag {
    display: inline-block;
    font-size: 10px; font-weight: 500;
    background: rgba(184,150,62,0.12);
    border: 1px solid rgba(184,150,62,0.25);
    color: var(--gold); border-radius: 4px;
    padding: 2px 7px; letter-spacing: 0.06em;
    text-transform: uppercase;
  }
  .tt-multi {
    font-size: 11px; font-weight: 600; color: var(--gold);
    margin-bottom: 2px; letter-spacing: 0.03em;
  }
  .tt-multi-sub {
    font-size: 10px; color: var(--muted); margin-bottom: 4px;
  }
  .tt-divider {
    height: 1px; background: rgba(184,150,62,0.12);
    margin: 6px 0;
  }
  .tt-hint {
    font-size: 9px; color: rgba(184,150,62,0.5);
    letter-spacing: 0.08em; text-transform: uppercase;
    margin-top: 4px;
  }


  .leaflet-control-zoom { border: 1px solid var(--border) !important; background: var(--navy2) !important; }

  /* ── LAYER SWITCHER ── */
  .layer-switcher {
    margin-bottom: 10px !important;
    margin-right: 4px !important;
  }
  .layer-switcher button {
    background: rgba(11,15,26,0.92);
    border: 1px solid rgba(184,150,62,0.3);
    color: var(--gold);
    font-family: 'Montserrat', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.04em;
    padding: 7px 13px;
    border-radius: 8px;
    cursor: pointer;
    backdrop-filter: blur(8px);
    box-shadow: 0 4px 16px rgba(0,0,0,0.4);
    transition: all 0.2s;
    white-space: nowrap;
  }
  .layer-switcher button:hover {
    background: rgba(184,150,62,0.12);
    border-color: rgba(184,150,62,0.6);
  }
  .leaflet-control-zoom a { background: var(--navy2) !important; color: var(--muted) !important; border-color: var(--border) !important; }
  .leaflet-control-zoom a:hover { color: var(--gold) !important; }

  .leaflet-popup-content-wrapper {
    background: #0b0f1a !important;
    border: 1px solid rgba(184,150,62,0.35) !important;
    border-radius: 10px !important;
    box-shadow: 0 8px 32px rgba(0,0,0,0.8) !important;
    padding: 0 !important;
  }
  .leaflet-popup-content { margin: 0 !important; }
  .leaflet-popup-tip-container { display: none; }

  .popup-inner { padding: 14px 16px; min-width: 200px; }
  .popup-name { font-family: 'Bebas Neue', sans-serif; font-size: 18px; color: var(--gold); letter-spacing: 1.5px; margin-bottom: 3px; }
  .popup-loc { font-size: 11px; color: var(--muted); margin-bottom: 8px; }
  .popup-fleet { font-size: 11px; color: var(--sky); margin-bottom: 10px; }
  .popup-btn {
    width: 100%; background: rgba(232,184,75,0.1);
    border: 1px solid rgba(232,184,75,0.3); color: var(--gold);
    padding: 7px; border-radius: 6px; cursor: pointer;
    font-size: 12px; font-family: 'DM Sans', sans-serif;
    font-weight: 500; transition: all 0.2s;
  }
  .popup-btn:hover { background: rgba(232,184,75,0.2); }

  /* ── LOCATION SUGGESTIONS ── */
  .loc-item {
    padding: 10px 14px;
    cursor: pointer;
    font-size: 12px;
    color: var(--text);
    border-bottom: 1px solid rgba(255,255,255,0.05);
    display: flex; align-items: center; gap: 8px;
    transition: background 0.15s;
  }
  .loc-item:last-child { border-bottom: none; }
  .loc-item:hover { background: rgba(78,163,212,0.1); color: var(--sky); }
  .loc-item .loc-name { font-weight: 600; }
  .loc-item .loc-sub { font-size: 10px; color: var(--muted); margin-top: 1px; font-family: 'DM Mono', monospace; }

  /* ── RADIUS CIRCLE ── */
  .radius-badge {
    position: absolute; bottom: 20px; left: 310px;
    background: var(--navy2); border: 1px solid var(--border);
    border-radius: 8px; padding: 8px 14px;
    font-size: 11px; font-family: 'DM Mono', monospace;
    color: var(--gold); z-index: 1000;
    display: none;
    gap: 10px; align-items: center;
  }
  .radius-badge.show { display: flex; }
  .radius-close { cursor: pointer; color: var(--muted); font-size: 14px; }
  .radius-close:hover { color: var(--red); }

  /* ── EMPTY ── */
  .empty { text-align: center; padding: 40px 16px; color: var(--muted); font-size: 12px; }

  /* ── TOAST ── */
  #toast {
    position: fixed; bottom: 20px; left: 50%;
    transform: translateX(-50%) translateY(60px);
    background: var(--navy3); border: 1px solid var(--border);
    border-radius: 8px; padding: 10px 20px;
    font-size: 12px; color: var(--text);
    z-index: 9998; transition: transform 0.3s;
    pointer-events: none; white-space: nowrap;
  }
  #toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>

          drop-shadow(0 0 90px rgba(180,200,255,0.2));
      }
      50% {
        filter:
          brightness(0) invert(1)
          drop-shadow(0 0 1px rgba(255,255,255,0.8))
          drop-shadow(0 0 5px rgba(255,255,255,0.6))
          drop-shadow(0 0 14px rgba(255,255,255,0.35))
          drop-shadow(0 0 28px rgba(200,220,255,0.2))
          drop-shadow(0 0 55px rgba(180,200,255,0.1));
      }
    }

    /* === LAPIN === */
    .rabbit-stage {
      position: relative;
      width: 120px; height: 90px;
      margin: 18px 0 6px;
    }
    .rabbit {
      position: absolute;
      bottom: 0; left: 50%;
      transform: translateX(-50%);
      font-size: 44px;
      animation: bunnyJump 0.6s cubic-bezier(0.22,1,0.36,1) infinite alternate;
      user-select: none;
      line-height: 1;
    }
    .rabbit-shadow {
      position: absolute;
      bottom: -2px; left: 50%;
      transform: translateX(-50%);
      width: 30px; height: 6px;
      background: rgba(184,150,62,0.25);
      border-radius: 50%;
      animation: shadowPulse 0.6s cubic-bezier(0.22,1,0.36,1) infinite alternate;
    }
    @keyframes bunnyJump {
      from { transform: translateX(-50%) translateY(0) rotate(-2deg); }
      to   { transform: translateX(-50%) translateY(-52px) rotate(4deg) scaleY(1.06); }
    }
    @keyframes shadowPulse {
      from { width:30px; opacity:.5; }
      to   { width:14px; opacity:.1; }
    }

    /* === TEXTE === */
    .loading-sub {
      font-family: 'DM Sans', sans-serif;
      font-size: 11px;
      color: rgba(200,191,168,0.45);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin: 4px 0 28px;
    }

    /* === BARRE === */
    .loading-bar-wrap {
      width: 200px; height: 1px;
      background: rgba(255,255,255,0.08);
      border-radius: 1px;
      overflow: hidden;
      margin-bottom: 32px;
    }
    .loading-bar {
      height: 100%;
      background: linear-gradient(90deg, rgba(255,255,255,0.3), rgba(255,255,255,0.9), rgba(200,220,255,0.5));
      border-radius: 1px;
      animation: loadBar 2s ease-in-out forwards;
      box-shadow: 0 0 6px rgba(255,255,255,0.6);
    }
    @keyframes loadBar {
      from { width: 0%; }
      to   { width: 100%; }
    }

    /* === CREDITS === */
    .loading-credits {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: rgba(200,191,168,0.25);
      letter-spacing: 0.1em;
    }
    .loading-credits .cr-name {
      color: rgba(184,150,62,0.55);
      font-weight: 500;
    }
  </style>

      attribution: '© <a href="https://stadiamaps.com/">Stadia Maps</a> © <a href="https://openmaptiles.org/">OpenMapTiles</a> © <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
      maxZoom: 20
    }),
    'Satellite': L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
      attribution: '© Esri © Earthstar Geographics',
      maxZoom: 19
    }),
  };
  layers['Sombre élégant'].addTo(map);

  // ── Layer switcher button
  const switcher = L.control({ position: 'bottomright' });
  switcher.onAdd = () => {
    const div = L.DomUtil.create('div', 'layer-switcher');
    const layerNames = Object.keys(layers);
    let current = 0;

    div.innerHTML = `<button id="layer-btn" title="Changer le fond de carte">🗺 ${layerNames[current]}</button>`;
    L.DomEvent.on(div.querySelector('#layer-btn'), 'click', () => {
      map.removeLayer(layers[layerNames[current]]);
      current = (current + 1) % layerNames.length;
      layers[layerNames[current]].addTo(map);
      div.querySelector('#layer-btn').textContent = '🗺 ' + layerNames[current];
    });
    L.DomEvent.disableClickPropagation(div);
    return div;
  };
  switcher.addTo(map);

  const searchInput = document.getElementById('search');
  const suggBox     = document.getElementById('location-suggestions');

  searchInput.addEventListener('input', () => {
    clearTimeout(searchTimeout);
    const q = searchInput.value.trim();
    suggBox.style.display = 'none';
    renderSidebar();
    renderMarkers();
    if (q.length >= 2) {
      searchTimeout = setTimeout(() => searchLocation(q), 500);
    }
  });

  searchInput.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
      suggBox.style.display = 'none';
      searchInput.value = '';
      renderSidebar();
      renderMarkers();
      clearLocation();
    }
  });

  document.addEventListener('click', e => {
    if (!searchInput.contains(e.target) && !suggBox.contains(e.target)) {
      suggBox.style.display = 'none';
    }
  });

  loadData();
});

// ── LOAD DATA FROM GOOGLE SHEETS ─────────────────────────────────────────────
async function loadData() {
  const btn = document.getElementById('btn-refresh');
  btn.classList.add('loading');
  btn.textContent = '↻ Chargement…';

  try {
    // CSV export : données brutes sans formatage Google Sheets
    const res  = await fetch(API_URL + '&t=' + Date.now());
    const text = await res.text();

    // Parser CSV proprement (gère les guillemets et virgules)
    const parseCSV = (str) => {
      const rows = [];
      // Gère les sauts de ligne dans les cellules entre guillemets
      let i = 0, cols = [], cur = '', inQ = false;
      while (i <= str.length) {
        const ch = str[i];
        if (ch === undefined) { // fin de fichier
          cols.push(cur.replace(/^"|"$/g, '').trim());
          if (cols.some(c => c)) rows.push(cols);
          break;
        }
        if (ch === '"') {
          if (inQ && str[i+1] === '"') { cur += '"'; i += 2; continue; } // guillemet échappé ""
          inQ = !inQ; i++; continue;
        }
        if (ch === ',' && !inQ) {
          cols.push(cur.replace(/^"|"$/g, '').trim()); cur = ''; i++; continue;
        }
        if ((ch === '\r' || ch === '\n') && !inQ) {
          if (ch === '\r' && str[i+1] === '\n') i++;
          cols.push(cur.replace(/^"|"$/g, '').trim());
          if (cols.some(c => c)) rows.push(cols);
          cols = []; cur = ''; i++; continue;
        }
        cur += ch; i++;
      }
      return rows;
    };

    const allRows = parseCSV(text);
    if (allRows.length < 2) throw new Error('CSV vide');

    const headers = allRows[0].map(h => h.toLowerCase().replace(/"/g, ''));
    const dataRows = allRows.slice(1);

    const idx = {
      nom:    headers.findIndex(c => c.includes('nom')),
      base:   headers.findIndex(c => c.includes('base')),
      natio:  headers.findIndex(c => c.includes('nation') || c.includes('pays')),
      tel:    headers.findIndex(c => c.includes('phone') || c.includes('tel')),
      email:  headers.findIndex(c => c.includes('email') || c.includes('mail')),
      lat:    headers.findIndex(c => c === 'lat'),
      lng:    headers.findIndex(c => c === 'lng'),
      flotte: headers.findIndex(c => c.includes('flotte') || c.includes('fleet')),
    };

    console.log('Headers CSV:', headers);
    console.log('Index colonnes:', idx);

    const getVal = (row, i) => i >= 0 && row[i] ? row[i].replace(/^"|"$/g, '').trim() : '';
    const getCoord = (row, i) => {
      const v = getVal(row, i);
      if (!v) return NaN;
      // Nettoyer : supprimer espaces, remplacer virgule par point
      const clean = v.replace(/\s/g, '').replace(',', '.');
      const n = parseFloat(clean);
      return (isNaN(n) || Math.abs(n) > 180) ? NaN : n;
    };

    operators = dataRows
      .filter(r => r[idx.nom] && r[idx.nom].trim())
      .map((r, i) => ({
        id:     'op_' + i,
        nom:    getVal(r, idx.nom),
        base:   getVal(r, idx.base),
        natio:  getVal(r, idx.natio),
        tel:    getVal(r, idx.tel),
        email:  getVal(r, idx.email),
        lat:    getCoord(r, idx.lat),
        lng:    getCoord(r, idx.lng),
        flotte: getVal(r, idx.flotte),
      }))
      .filter(o => o.nom);

    console.log('Total opérateurs:', operators.length, '— Avec coords:', operators.filter(o => !isNaN(o.lat)).length);

    buildFilters();
    renderSidebar();
    renderMarkers();
    updateCounters();

    document.getElementById('loader').classList.add('hidden');
    showToast(`✓ ${operators.length} bases chargées depuis Google Sheets`);

  } catch(e) {
    console.error(e);
    document.getElementById('loader-text').textContent = '⚠ Erreur de chargement — vérifiez que le sheet est public';
    showToast('⚠ Erreur de chargement');
  }

  btn.classList.remove('loading');
  btn.textContent = '↻ Actualiser';
}

// ── FILTERS ──────────────────────────────────────────────────────────────────
let currentFlotteFilter = 'all';

function buildFilters() {
  // Filtre pays
  const pays = [...new Set(operators.map(o => o.natio).filter(Boolean))].sort();
  const wrap = document.getElementById('filter-btns');
  wrap.innerHTML = `<button class="filt active" data-f="all" onclick="setFilter('all',this)">Tous</button>`;
  pays.slice(0, 8).forEach(p => {
    const b = document.createElement('button');
    b.className = 'filt';
    b.dataset.f = p;
    b.textContent = p;
    b.onclick = () => setFilter(p, b);
    wrap.appendChild(b);
  });

  // Filtre appareils — extraire tous les modèles uniques
  const modeles = new Set();
  operators.forEach(o => {
    if (!o.flotte) return;
    o.flotte.split('|').forEach(a => {
      const modele = a.trim().replace(/\s+[A-Z0-9]{1,2}-[A-Z0-9]+$/, '').trim();
      if (modele) modeles.add(modele);
    });
  });

  const select = document.getElementById('filter-flotte-select');
  if (select) {
    select.innerHTML = `<option value="all">🚁 Tous appareils</option>`;
    [...modeles].sort().forEach(m => {
      const opt = document.createElement('option');
      opt.value = m;
      opt.textContent = m;
      select.appendChild(opt);
    });
  }
}

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('#filter-btns .filt').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderSidebar();
  renderMarkers();
}

function setFlotteFilter(f) {
  currentFlotteFilter = f;
  renderSidebar();
  renderMarkers();
}

function getFiltered() {
  const q = document.getElementById('search').value.toLowerCase();
  return operators.filter(o => {
    const matchF = currentFilter === 'all' || o.natio === currentFilter;
    const matchQ = !q || [o.nom, o.base, o.natio, o.email].some(v => v && v.toLowerCase().includes(q));
    const matchA = currentFlotteFilter === 'all' || (o.flotte && o.flotte.toLowerCase().includes(currentFlotteFilter.toLowerCase()));
    return matchF && matchQ && matchA;
  });
}

// ── SIDEBAR ──────────────────────────────────────────────────────────────────
function renderSidebar() {
  const filtered = getFiltered();
  document.getElementById('sidebar-count').textContent = `${filtered.length} résultat${filtered.length > 1 ? 's' : ''}`;

  const list = document.getElementById('op-list');
  if (!filtered.length) {
    list.innerHTML = '<div class="empty">Aucun résultat</div>';
    return;
  }

  // Grouper par nom d'opérateur
  const grouped = {};
  filtered.forEach(o => {
    if (!grouped[o.nom]) grouped[o.nom] = [];
    grouped[o.nom].push(o);
  });

  list.innerHTML = Object.entries(grouped).map(([nom, ops]) => {
    const first = ops[0];
    const isActive = activeNom && ops.some(o => o.nom === activeNom);
    const bases = ops.map(o => o.base).filter(Boolean);
    return `
      <div class="op-item ${isActive ? 'active' : ''}" onclick="selectGroup('${nom.replace(/'/g,'\\\'')}')" onmouseenter="highlightGroup('${nom.replace(/'/g,'\\\'')}')" onmouseleave="unhighlightGroup()">
        <div class="op-name">🚁 ${nom}</div>
        <div class="op-base">📍 ${first.natio || '—'} · ${ops.length} base${ops.length > 1 ? 's' : ''}</div>
        <div class="op-tags">
          ${bases.slice(0,3).map(b => `<span class="tag">${b.split(' - ')[0].trim()}</span>`).join('')}
          ${bases.length > 3 ? `<span class="tag">+${bases.length - 3}</span>` : ''}
        </div>
      </div>`;
  }).join('');
}

// ── MARKERS ──────────────────────────────────────────────────────────────────
let hoveredNom = null;

function makeIcon(ops) {
  const isActive = activeNom && ops.some(o => o.nom === activeNom);
  const isHL     = hoveredNom && ops.some(o => o.nom === hoveredNom);
  const on = isActive || isHL;
  return L.divIcon({
    className: '',
    html: `<div style="
      width:30px;height:30px;border-radius:50%;
      background:${on ? '#e8b84b' : '#0f1829'};
      border:2px solid ${on ? '#e8b84b' : 'rgba(232,184,75,0.6)'};
      display:flex;align-items:center;justify-content:center;font-size:13px;
      box-shadow:0 0 0 ${on ? '6px' : '3px'} rgba(232,184,75,${on ? '0.35' : '0.1'}),0 4px 12px rgba(0,0,0,0.5);
      cursor:pointer;transition:all 0.2s;
    ">🚁</div>`,
    iconSize:[30,30], iconAnchor:[15,15],
  });
}

function renderMarkers() {
  Object.values(markers).forEach(m => map.removeLayer(m));
  markers = {};

  // Regrouper par position identique
  const byPos = {};
  getFiltered().forEach(o => {
    if (isNaN(o.lat) || isNaN(o.lng)) return;
    const key = o.lat.toFixed(4) + ',' + o.lng.toFixed(4);
    if (!byPos[key]) byPos[key] = [];
    byPos[key].push(o);
  });

  Object.values(byPos).forEach(ops => addMarker(ops));
}

function addMarker(ops) {
  const first = ops[0];
  const noms = [...new Set(ops.map(o => o.nom))];

  const popupHTML = noms.map(nom => {
    const op = ops.find(o => o.nom === nom);
    const nomEsc = nom.replace(/'/g, "\'");
    return `<div style="padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.06)">
      <div class="popup-name">${nom}</div>
      <div class="popup-loc">📍 ${op.base||'—'} · ${op.natio||''}</div>
      ${op.tel   ? `<div class="popup-fleet">📞 ${op.tel}</div>`   : ''}
      ${op.email ? `<div class="popup-fleet">✉ ${op.email}</div>` : ''}
      <button class="popup-btn" style="margin-top:6px" onclick="selectGroup('${nomEsc}')">Voir la fiche →</button>
    </div>`;
  }).join('');

  // Build tooltip HTML
  let tooltipHTML;
  if (noms.length === 1) {
    const op = ops[0];
    const bases = [...new Set(ops.map(o => o.base))].filter(Boolean);
    tooltipHTML = `<div class="tt-inner">
      <div class="tt-name">${noms[0]}</div>
      <div class="tt-base">📍 ${bases[0] || op.base || '—'}</div>
      <span class="tt-flag">${op.natio || '—'}</span>
      ${bases.length > 1 ? `<div class="tt-hint" style="margin-top:6px">+${bases.length-1} autre${bases.length>2?'s':''} base${bases.length>2?'s':''}</div>` : ''}
    </div>`;
  } else {
    const countries = [...new Set(noms.map(n => ops.find(o=>o.nom===n)?.natio).filter(Boolean))];
    tooltipHTML = `<div class="tt-inner">
      <div class="tt-multi">${noms.length} opérateurs</div>
      <div class="tt-multi-sub">sur cette base</div>
      <div class="tt-divider"></div>
      ${noms.slice(0,3).map(n => `<div style="font-size:11px;color:var(--text);margin-bottom:2px">· ${n}</div>`).join('')}
      ${noms.length > 3 ? `<div class="tt-hint">+${noms.length-3} autres…</div>` : ''}
    </div>`;
  }

  const m = L.marker([first.lat, first.lng], { icon: makeIcon(ops) });
  m.addTo(map);

  // Bind tooltip (shown on hover, hidden on click)
  m.bindTooltip(tooltipHTML, {
    className: 'aa-tooltip',
    direction: 'right',
    permanent: false,
    opacity: 1,
    offset: [8, 0],
  });

  m.bindPopup(L.popup({ offset:[0,-8], closeButton:false, maxWidth:280 })
    .setContent(`<div class="popup-inner">${popupHTML}</div>`));

  m.on('click', () => {
    m.closeTooltip();
    if (noms.length === 1) selectGroup(noms[0]);
  });

  // Highlight all bases of hovered operator
  m.on('mouseover', () => {
    if (noms.length === 1) highlightGroup(noms[0]);
    m.openTooltip();
  });
  m.on('mouseout', () => {
    if (noms.length === 1) unhighlightGroup();
    m.closeTooltip();
  });

  m._ops = ops;
  ops.forEach(o => { markers[o.id] = m; });
}

function highlightGroup(nom) {
  hoveredNom = nom;
  Object.values(markers).forEach(m => { if (m._ops) m.setIcon(makeIcon(m._ops)); });
}

function unhighlightGroup() {
  hoveredNom = null;
  Object.values(markers).forEach(m => { if (m._ops) m.setIcon(makeIcon(m._ops)); });
}

// ── SELECT ────────────────────────────────────────────────────────────────────
function selectGroup(nom) {
  const ops = operators.filter(o => o.nom === nom);
  if (!ops.length) return;

  activeNom = nom;
  renderSidebar();
  renderMarkers();

  // Zoom sur le groupe
  const valid = ops.filter(o => !isNaN(o.lat) && !isNaN(o.lng));
  if (valid.length === 1) {
    map.flyTo([valid[0].lat, valid[0].lng], 8, { duration: 1 });
    if (markers[valid[0].id]) markers[valid[0].id].openPopup();
  } else if (valid.length > 1) {
    const bounds = L.latLngBounds(valid.map(o => [o.lat, o.lng]));
    map.flyToBounds(bounds, { padding: [60, 60], duration: 1 });
  }

  openDetail(nom, ops);
}

function openDetail(nom, ops) {
  document.getElementById('d-name').textContent = nom;
  document.getElementById('d-loc').textContent = `📍 ${ops[0].natio || '—'} · ${ops.length} base${ops.length > 1 ? 's' : ''}`;

  const basesHTML = ops.map(o => `
    <div class="d-fleet-item">
      <span>🏁</span>
      <span style="font-size:12px">${o.base || 'Base non renseignée'}</span>
    </div>`).join('');

  const contacts = [];
  if (ops[0].tel)   contacts.push(`<div class="d-contact"><span>📞</span><a href="tel:${ops[0].tel}">${ops[0].tel}</a></div>`);
  if (ops[0].email) contacts.push(`<div class="d-contact"><span>✉</span><a href="mailto:${ops[0].email}">${ops[0].email}</a></div>`);

  // Section flotte
  const flotteStr = ops[0].flotte || '';
  let flotteHTML = '';
  if (flotteStr) {
    const appareils = flotteStr.split('|').map(a => a.trim()).filter(Boolean);
    flotteHTML = `<div class="d-section">
      <div class="d-title">🚁 Flotte (${appareils.length} appareil${appareils.length > 1 ? 's' : ''})</div>
      ${appareils.map(a => `
        <div class="d-fleet-item" style="background:rgba(184,150,62,0.06);border-color:rgba(184,150,62,0.15);">
          <span>🚁</span>
          <span style="font-size:12px;color:var(--gold2)">${a}</span>
        </div>`).join('')}
    </div>`;
  }

  document.getElementById('d-body').innerHTML = `
    <div class="d-section">
      <div class="d-title">🏁 Bases (${ops.length})</div>
      ${basesHTML}
    </div>
    ${flotteHTML}
    ${contacts.length ? `<div class="d-section"><div class="d-title">📞 Contact</div>${contacts.join('')}</div>` : ''}
  `;

  document.getElementById('detail').classList.add('open');
}

function closeDetail() {
  document.getElementById('detail').classList.remove('open');
  activeNom = null;
  renderSidebar();
}

// ── COUNTERS ─────────────────────────────────────────────────────────────────
function updateCounters() {
  const noms = [...new Set(operators.map(o => o.nom))];
  document.getElementById('counter').textContent = `${noms.length} opérateurs`;
  document.getElementById('base-counter').textContent = `${operators.filter(o => !isNaN(o.lat)).length} bases`;
}

// ── DEBUG ────────────────────────────────────────────────────────────────────
async function debugData() {
  let msg = '=== OPÉRATEURS CHARGÉS: ' + operators.length + ' ===\n';
  msg += 'Avec coords: ' + operators.filter(o => !isNaN(o.lat) && !isNaN(o.lng)).length + '\n\n';
  msg += '=== 3 PREMIERS ===\n';
  operators.slice(0, 3).forEach(o => {
    msg += `${o.nom} | ${o.base} | lat=${o.lat} lng=${o.lng}\n`;
  });
  msg += '\n=== SANS COORDS (5 premiers) ===\n';
  operators.filter(o => isNaN(o.lat)).slice(0,5).forEach(o => {
    msg += `${o.nom} | lat=${o.lat} lng=${o.lng}\n`;
  });
  alert(msg);
}

// ── LOCATION SEARCH ──────────────────────────────────────────────────────────
let locationMarker = null;
let locationCircle = null;
let searchTimeout = null;

// location search wired in main listener

async function searchLocation(q) {
  const sugg = document.getElementById('location-suggestions');
  sugg.style.display = 'block';
  sugg.innerHTML = '<div class="loc-item"><span>⏳</span><div><div class="loc-name">Recherche…</div></div></div>';

  try {
    const url = `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&format=json&limit=5&addressdetails=1`;
    const res  = await fetch(url, { headers: { 'Accept-Language': 'fr', 'User-Agent': 'AEROAFFAIRES/1.0' } });
    const data = await res.json();

    if (!data.length) {
      sugg.innerHTML = '<div class="loc-item"><span>❌</span><div><div class="loc-name">Aucun résultat</div></div></div>';
      return;
    }

    sugg.innerHTML = data.map((r, i) => {
      const city    = r.address?.city || r.address?.town || r.address?.village || r.address?.county || '';
      const country = r.address?.country || '';
      const label   = r.display_name.split(',').slice(0,2).join(',');
      const sub     = [city, country].filter(Boolean).join(', ');
      return `<div class="loc-item" onclick="goToLocation(${r.lat}, ${r.lon}, '${label.replace(/'/g,"\'")}')">
        <span>📍</span>
        <div>
          <div class="loc-name">${label}</div>
          ${sub ? `<div class="loc-sub">${sub}</div>` : ''}
        </div>
      </div>`;
    }).join('');

  } catch(e) {
    sugg.innerHTML = '<div class="loc-item"><span>⚠️</span><div><div class="loc-name">Erreur de recherche</div></div></div>';
  }
}

function goToLocation(lat, lng, label) {
  const sugg  = document.getElementById('location-suggestions');
  const input = document.getElementById('search');
  sugg.style.display = 'none';
  input.value = '';
  renderSidebar();
  renderMarkers();

  // Supprimer ancien marker/cercle
  if (locationMarker) { map.removeLayer(locationMarker); locationMarker = null; }
  if (locationCircle) { map.removeLayer(locationCircle); locationCircle = null; }

  lat = parseFloat(lat); lng = parseFloat(lng);

  // Marqueur de position
  locationMarker = L.marker([lat, lng], {
    icon: L.divIcon({
      className: '',
      html: `<div style="
        width:16px;height:16px;border-radius:50%;
        background:#4ea3d4;border:3px solid white;
        box-shadow:0 0 0 4px rgba(78,163,212,0.3),0 4px 12px rgba(0,0,0,0.5);
      "></div>`,
      iconSize:[16,16], iconAnchor:[8,8],
    })
  }).addTo(map);

  // Cercle de 50km
  locationCircle = L.circle([lat, lng], {
    radius: 200000,
    color: '#4ea3d4',
    fillColor: '#4ea3d4',
    fillOpacity: 0.05,
    weight: 1.5,
    dashArray: '6,4',
  }).addTo(map);

  // Zoom
  map.flyTo([lat, lng], 9, { duration: 1.2 });

  // Badge radius
  const badge = document.getElementById('radius-badge');
  if (badge) {
    badge.querySelector('#radius-label').textContent = `📍 ${label} · rayon 200 km`;
    badge.classList.add('show');
  }
}

function clearLocation() {
  if (locationMarker) { map.removeLayer(locationMarker); locationMarker = null; }
  if (locationCircle) { map.removeLayer(locationCircle); locationCircle = null; }
  document.getElementById('search').value = ''; renderSidebar(); renderMarkers();
  const badge = document.getElementById('radius-badge');
  if (badge) badge.classList.remove('show');
}

// ── TOAST ─────────────────────────────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}
